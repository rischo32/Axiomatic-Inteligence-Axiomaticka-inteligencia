abstract: "<p><strong><span dir=\"auto\"><span dir=\"auto\">Inteligencia Axiomatic\
  \ v8.0.0</span></span></strong></p>\n<p>&nbsp;</p>\n<p><span dir=\"auto\"><span\
  \ dir=\"auto\">Axiomatic's Intelligence (v8.0.0) je ontologicko-etick&yacute; r&aacute;mec\
  \ pre bezpe\u010Dn&eacute; syst&eacute;my umelej inteligencie, zalo\u017Een&yacute;\
  \ na nemennom s&uacute;bore 8 z&aacute;kladn&yacute;ch axi&oacute;mov (INT, LEX,\
  \ WIS, REL, VER, LIB, UNI, CRE).</span></span></p>\n<p><span dir=\"auto\"><span\
  \ dir=\"auto\">Jadro je kryptograficky chr&aacute;nen&eacute; a reprezentovan&eacute;\
  \ ako 8-uzlov&aacute; axiomov&aacute; sie\u0165 (8&times;8), doplnen&aacute; o normy\
  \ bezpe\u010Dnostn&eacute;ho riadenia, drift-detekcie, auditov, simul&aacute;ci&iacute;\
  \ a form&aacute;lnej verifik&aacute;cie.</span></span></p>\n<p><span dir=\"auto\"\
  ><span dir=\"auto\">T&aacute;to verzia je prv&aacute; verzia plne zos&uacute;laden&aacute;\
  \ s E&Uacute; AI Act, vr&aacute;tane po\u017Eiadaviek na:</span></span></p>\n<p>&nbsp;</p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">transparentnos\u0165,</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">riadenie riz&iacute;k,</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">logovanie a auditovate\u013Enos\u0165,</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">\u013Eudsk&yacute; doh\u013Ead (HITL/HOTL),</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">bezpe\u010Dn&uacute; pr&aacute;cu so syntetick&yacute;mi\
  \ d&aacute;tami,</span></span></p>\n<p><span dir=\"auto\"><span dir=\"auto\">odolnos\u0165\
  \ vo\u010Di zmen&aacute;m jadra (nezmenite\u013En&eacute; axi&oacute;my).</span></span></p>\n\
  <p>&nbsp;</p>\n<p><span dir=\"auto\"><span dir=\"auto\">Bal&iacute;k obsahuje:</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">Inteligencia Manifest Axiomatic v8.0.0,</span></span></p>\n\
  <p><span dir=\"auto\"><span dir=\"auto\">Licencia AEPL-EU 1.1 (EU AI Act&ndash;aligned)</span></span></p>\n\
  <p>&nbsp;</p>\n<p><span dir=\"auto\"><span dir=\"auto\">Syst&eacute;m je ur\u010D\
  en&yacute; pre v&yacute;skumn&iacute;kov AI bezpe\u010Dnosti, etick&yacute;ch architektov,\
  \ tvorcov vysokorizikov&yacute;ch aplik&aacute;ci&iacute; AI a pre projekty, ktor&eacute;\
  \ s&uacute; potrebn&eacute; pre nemenn&eacute; jadro rozhodovania s aud&iacute;torskou\
  \ nadstavbou.</span></span></p>"
